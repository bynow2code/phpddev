services:

  mysql:
    container_name: mysql
    image: mysql:8.0.45
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    container_name: redis
    image: redis:7.0.15
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  

  php:
    container_name: php
    build:
      context: .
      dockerfile: php/Dockerfile
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./www:/usr/share/nginx/html

  nginx:
    image: nginx:1.24.0
    container_name: nginx
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./www:/usr/share/nginx/html
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data: